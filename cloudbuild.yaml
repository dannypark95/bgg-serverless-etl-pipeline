steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/bgg-pipeline-image:latest'
      - '.'

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/bgg-pipeline-image:latest'

  # Step 3: Deploy Job 1 (The Pre-Processor)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'bgg-csv-job'
      - '--image'
      - 'gcr.io/$PROJECT_ID/bgg-pipeline-image:latest'
      - '--command'
      - 'python,bgg_csv.py'
      - '--region'
      - 'us-central1'
      - '--set-env-vars'
      - 'PROJECT_ID=boardgame-catalog-app,BUCKET_NAME=boardgame-catalog-app.firebasestorage.app,COLLECTION_NAME=boardgames'

  # Step 4: Deploy Job 2 (The Main Extractor)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'bgg-extractor-job'
      - '--image'
      - 'gcr.io/$PROJECT_ID/bgg-pipeline-image:latest'
      - '--command'
      - 'python,bgg_extractor.py'
      - '--region'
      - 'us-central1'
      - '--set-env-vars'
      - 'PROJECT_ID=boardgame-catalog-app,BUCKET_NAME=boardgame-catalog-app.firebasestorage.app,COLLECTION_NAME=boardgames'

  # Step 5: Deploy Job 3 (The BoardLife Scraper)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'boardlife-scraper-job'
      - '--image'
      - 'gcr.io/$PROJECT_ID/bgg-pipeline-image:latest'
      - '--command'
      - 'python,boardlife_scraper.py'
      - '--region'
      - 'us-central1'
      - '--set-env-vars'
      - 'PROJECT_ID=boardgame-catalog-app,COLLECTION_NAME=boardgames'

images:
  - 'gcr.io/$PROJECT_ID/bgg-pipeline-image:latest'