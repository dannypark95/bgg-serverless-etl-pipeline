options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _PROJECT_ID: "boardgame-catalog-app"
  _BUCKET_NAME: "boardgame-catalog-app.firebasestorage.app"
  _COLLECTION: "boardgames"
  _REGION: "us-central1"
  _SA: "471895724686-compute@developer.gserviceaccount.com"

steps:
  # Step 1 & 2: Build and Push Docker Image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest", "."]
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest"]

  # Step 3: Deploy CSV Job (4hr timeout - completes in single run)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "bgg-csv-job"
      - "--image=gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest"
      - "--command=python,bgg_csv.py"
      - "--region=${_REGION}"
      - "--task-timeout=14400s"
      - "--set-env-vars=PROJECT_ID=${_PROJECT_ID},BUCKET_NAME=${_BUCKET_NAME},COLLECTION_NAME=${_COLLECTION},TASK_TIMEOUT=14400"
      - "--set-secrets=BGG_TOKEN=BGG_TOKEN:latest"

  # Step 4: Deploy Extractor Job
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "bgg-extractor-job"
      - "--image=gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest"
      - "--command=python,bgg_extractor.py"
      - "--region=${_REGION}"
      - "--task-timeout=3600s"
      - "--max-retries=3"
      - "--set-env-vars=PROJECT_ID=${_PROJECT_ID},BUCKET_NAME=${_BUCKET_NAME},COLLECTION_NAME=${_COLLECTION}"
      - "--set-secrets=BGG_TOKEN=BGG_TOKEN:latest"

  # Step 5: Deploy Translator Job (Increased timeout to 1 hour)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "gemini-translator-job"
      - "--image=gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest"
      - "--command=python,gemini_translator.py"
      - "--region=${_REGION}"
      - "--task-timeout=3600s"
      - "--max-retries=2"
      - "--set-env-vars=PROJECT_ID=${_PROJECT_ID},COLLECTION_NAME=${_COLLECTION}"
      - "--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest"

  # Step 6: Prerequisites (Identity and API enablement)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud beta services identity create --service=workflows.googleapis.com || echo "Identity exists"
        gcloud services enable cloudscheduler.googleapis.com || echo "API enabled"

  # Step 7: Deploy Workflow
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "workflows",
        "deploy",
        "bgg-main-pipeline",
        "--source=workflow.yaml",
        "--location=${_REGION}",
      ]

  # Step 8: Deploy Schedule
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud scheduler jobs create http bgg-weekly-sync \
          --schedule="0 3 * * 0" \
          --uri="https://workflowexecutions.googleapis.com/v1/projects/${PROJECT_ID}/locations/${_REGION}/workflows/bgg-main-pipeline/executions" \
          --message-body="{}" \
          --time-zone="Asia/Seoul" \
          --location="${_REGION}" \
          --oauth-service-account-email="${_SA}" \
          || gcloud scheduler jobs update http bgg-weekly-sync \
          --schedule="0 3 * * 0" \
          --uri="https://workflowexecutions.googleapis.com/v1/projects/${PROJECT_ID}/locations/${_REGION}/workflows/bgg-main-pipeline/executions" \
          --time-zone="Asia/Seoul" \
          --location="${_REGION}" \
          --oauth-service-account-email="${_SA}"

images: ["gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest"]
