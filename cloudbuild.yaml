options:
  logging: CLOUD_LOGGING_ONLY

# --- GLOBAL VARIABLES ---
substitutions:
  _PROJECT_ID: "boardgame-catalog-app"
  _BUCKET_NAME: "boardgame-catalog-app.firebasestorage.app"
  _COLLECTION: "boardgames"
  _REGION: "us-central1"

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest'
      - '.'

  # Step 2: Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest'

  # Step 3: Deploy Job (CSV Ranking)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'bgg-csv-job'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest'
      - '--command'
      - 'python,bgg_csv.py'
      - '--region'
      - '${_REGION}'
      - '--set-env-vars'
      - 'PROJECT_ID=${_PROJECT_ID},BUCKET_NAME=${_BUCKET_NAME},COLLECTION_NAME=${_COLLECTION}'
      - '--set-secrets'
      - 'BGG_TOKEN=BGG_TOKEN:latest'

  # Step 4: Deploy Job (The Main Extractor)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'bgg-extractor-job'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest'
      - '--command'
      - 'python,bgg_extractor.py'
      - '--region'
      - '${_REGION}'
      - '--set-env-vars'
      - 'PROJECT_ID=${_PROJECT_ID},BUCKET_NAME=${_BUCKET_NAME},COLLECTION_NAME=${_COLLECTION}'
      - '--set-secrets'
      - 'BGG_TOKEN=BGG_TOKEN:latest'

  # Step 5: Deploy Job (The Gemini Translator)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'gemini-translator-job'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest'
      - '--command'
      - 'python,gemini_translator.py'
      - '--region'
      - '${_REGION}'
      - '--set-env-vars'
      - 'PROJECT_ID=${_PROJECT_ID},COLLECTION_NAME=${_COLLECTION}'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'

  # Step 6: Deploy the Workflow
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'workflows'
      - 'deploy'
      - 'bgg-main-pipeline'
      - '--source'
      - 'workflow.yaml'
      - '--region'
      - '${_REGION}'

  # Step 7: Create or Update the Weekly Schedule
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud scheduler jobs create http bgg-weekly-sync \
          --schedule="0 3 * * 0" \
          --uri="https://workflowexecutions.googleapis.com/v1/projects/${PROJECT_ID}/locations/us-central1/workflows/bgg-main-pipeline/executions" \
          --message-body="{}" \
          --time-zone="Asia/Seoul" \
          --location="us-central1" \
          --oauth-service-account-email="471895724686-compute@developer.gserviceaccount.com" \
          || gcloud scheduler jobs update http bgg-weekly-sync \
          --schedule="0 3 * * 0" \
          --uri="https://workflowexecutions.googleapis.com/v1/projects/${PROJECT_ID}/locations/us-central1/workflows/bgg-main-pipeline/executions" \
          --message-body="{}" \
          --time-zone="Asia/Seoul" \
          --location="us-central1" \
          --oauth-service-account-email="471895724686-compute@developer.gserviceaccount.com"

images:
  - 'gcr.io/${PROJECT_ID}/bgg-pipeline-image:latest'