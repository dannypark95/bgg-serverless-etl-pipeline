main:
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-central1"

    # Step 1: Pre-process CSV and apply 73-rating threshold
    - run_bgg_csv_job:
        call: run_job_and_wait
        args:
          job_name: "bgg-csv-job"
          project_id: ${project_id}
          location: ${location}
        result: csv_job_result

    # Step 2: Sync metadata from BGG and initialize localized maps
    - run_bgg_extractor_job:
        call: run_job_and_wait
        args:
          job_name: "bgg-extractor-job"
          project_id: ${project_id}
          location: ${location}
        result: extractor_job_result

    # Step 3: Run Gemini AI for multi-language translations
    - run_gemini_translator_job:
        call: run_job_and_wait
        args:
          job_name: "gemini-translator-job"
          project_id: ${project_id}
          location: ${location}
        result: translator_job_result

    - finish:
        return: "BGG Localization Pipeline Succeeded!"

# --- Reusable Sub-workflow to handle Cloud Run Job Execution ---
run_job_and_wait:
  params: [job_name, project_id, location]
  steps:
    - start_job:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${location}
        result: execution
    
    - wait_for_completion:
        call: googleapis.run.v1.namespaces.executions.get
        args:
          name: ${execution.metadata.name}
          location: ${location}
        result: status
    
    - check_condition:
        switch:
          - condition: ${status.status.conditions[0].status == "Unknown"}
            next: sleep_and_repeat
          - condition: ${status.status.conditions[0].status == "False"}
            raise: ${"Job " + job_name + " failed!"}
        next: job_succeeded

    - sleep_and_repeat:
        call: sys.sleep
        args:
          seconds: 30
        next: wait_for_completion

    - job_succeeded:
        return: ${status}