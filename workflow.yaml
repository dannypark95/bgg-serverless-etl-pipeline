main:
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-central1"
          - bucket_name: "boardgame-catalog-app.firebasestorage.app"
          - curr_date: ${text.split(time.format(sys.now()), "T")[0]}
          - iteration: 0
          - max_iterations: 5
          - csv_loop_count: 0
          - max_csv_loops: 15

    - check_if_csv_exists:
        try:
          call: http.get
          args:
            url: ${"https://storage.googleapis.com/storage/v1/b/" + bucket_name + "/o/bgg_master_list_" + curr_date + ".csv"}
            auth:
              type: OAuth2
          result: file_check
        except:
          as: e
          steps:
            - file_not_found:
                next: run_bgg_csv_job

    - skip_to_extractor:
        next: run_bgg_extractor_job

    - run_bgg_csv_job:
        call: run_job_and_wait
        args:
          job_name: "bgg-csv-job"
          project_id: ${project_id}
          location: ${location}
          overrides:
            env:
              - name: "CURR_DATE"
                value: ${curr_date}
        result: csv_job_result

    - check_csv_after_run:
        try:
          call: http.get
          args:
            url: ${"https://storage.googleapis.com/storage/v1/b/" + bucket_name + "/o/bgg_master_list_" + curr_date + ".csv"}
            auth:
              type: OAuth2
          result: file_check
        except:
          as: e
          steps:
            - csv_increment:
                assign:
                  - csv_loop_count: ${csv_loop_count + 1}
                next: csv_check_loop
            - csv_check_loop:
                switch:
                  - condition: ${csv_loop_count < max_csv_loops}
                    next: run_bgg_csv_job
                next: fail_csv_timeout
        next: run_bgg_extractor_job

    - fail_csv_timeout:
        raise: "CSV job did not complete after 15 runs. Check checkpoint in GCS."

    - run_bgg_extractor_job:
        call: run_job_and_wait
        args:
          job_name: "bgg-extractor-job"
          project_id: ${project_id}
          location: ${location}
          overrides:
            env:
              - name: "CURR_DATE"
                value: ${curr_date}

    - check_translation_loop:
        switch:
          - condition: ${iteration < max_iterations}
            next: execute_translation_step
        next: finish_pipeline

    - execute_translation_step:
        call: run_job_and_wait
        args:
          job_name: "gemini-translator-job"
          project_id: ${project_id}
          location: ${location}
          overrides: {}
        next: increment_iteration

    - increment_iteration:
        assign:
          - iteration: ${iteration + 1}
        next: check_translation_loop

    - finish_pipeline:
        return: "Full Pipeline Succeeded!"

# --- Reusable Sub-workflow ---
run_job_and_wait:
  params: [job_name, project_id, location, overrides]
  steps:
    - start_job:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${location}
          body:
            overrides:
              containerOverrides:
                - env: ${default(map.get(overrides, "env"), [])}
        result: execution
    
    - wait_for_completion:
        call: googleapis.run.v1.namespaces.executions.get
        args:
          name: ${execution.metadata.name}
          location: ${location}
        result: status
    
    - check_condition:
        switch:
          - condition: ${status.status.conditions[0].status == "Unknown"}
            next: sleep_and_repeat
          - condition: ${status.status.conditions[0].status == "False"}
            raise: ${"Job " + job_name + " failed!"}
        next: job_succeeded

    - sleep_and_repeat:
        call: sys.sleep
        args:
          seconds: 30
        next: wait_for_completion

    - job_succeeded:
        return: ${status}