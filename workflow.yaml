main:
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-central1"
          - bucket_name: "boardgame-catalog-app.firebasestorage.app"
          - curr_date: ${text.split(sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID"), "-")[0]} # Simplified date logic or use a dedicated variable
          - iteration: 0
          - max_iterations: 5

    - check_if_csv_exists:
        try:
          call: http.get
          args:
            url: ${"https://storage.googleapis.com/storage/v1/b/" + bucket_name + "/o/bgg_master_list_" + curr_date + ".csv"}
            auth:
              type: OAuth2
          result: file_check
          next: run_bgg_extractor_job # If file exists, skip Step 1
        retry:
          attempts: 1
        except:
          as: e
          steps:
            - log_missing_file:
                assign:
                  - log_msg: "CSV not found for today. Starting CSV Job."
                next: run_bgg_csv_job # If 404, proceed to run the job

    - run_bgg_csv_job:
        call: run_job_and_wait
        args:
          job_name: "bgg-csv-job"
          project_id: ${project_id}
          location: ${location}

    - run_bgg_extractor_job:
        call: run_job_and_wait
        args:
          job_name: "bgg-extractor-job"
          project_id: ${project_id}
          location: ${location}

    - check_translation_loop:
        switch:
          - condition: ${iteration < max_iterations}
            next: execute_translation_step
        next: finish_pipeline

    - execute_translation_step:
        call: run_job_and_wait
        args:
          job_name: "gemini-translator-job"
          project_id: ${project_id}
          location: ${location}
        next: increment_iteration

    - increment_iteration:
        assign:
          - iteration: ${iteration + 1}
        next: check_translation_loop

    - finish_pipeline:
        return: "Full Pipeline Succeeded!"

# --- Reusable Sub-workflow ---
run_job_and_wait:
  params: [job_name, project_id, location]
  steps:
    - start_job:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/" + job_name}
          location: ${location}
        result: execution
    
    - wait_for_completion:
        call: googleapis.run.v1.namespaces.executions.get
        args:
          name: ${execution.metadata.name}
          location: ${location}
        result: status
    
    - check_condition:
        switch:
          - condition: ${status.status.conditions[0].status == "Unknown"}
            next: sleep_and_repeat
          - condition: ${status.status.conditions[0].status == "False"}
            raise: ${"Job " + job_name + " failed!"}
        next: job_succeeded

    - sleep_and_repeat:
        call: sys.sleep
        args:
          seconds: 30
        next: wait_for_completion

    - job_succeeded:
        return: ${status}